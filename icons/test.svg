<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <rect width="500" height="500" fill="white"/>

  <!-- Cercles concentriques multicolores – navy · rouge · bleu ciel · or -->
  <!-- r=65 navy -->
  <circle cx="250" cy="250" r="65"  fill="none" stroke="#2E3192" stroke-width="4.5" stroke-dasharray="59 23" stroke-linecap="round" stroke-dashoffset="0"/>
  <!-- r=77 rouge -->
  <circle cx="250" cy="250" r="77"  fill="none" stroke="#E84528" stroke-width="4.5" stroke-dasharray="58 22" stroke-linecap="round" stroke-dashoffset="12"/>
  <!-- r=89 bleu ciel -->
  <circle cx="250" cy="250" r="89"  fill="none" stroke="#4ABDE8" stroke-width="4.5" stroke-dasharray="57 22" stroke-linecap="round" stroke-dashoffset="6"/>
  <!-- r=101 or -->
  <circle cx="250" cy="250" r="101" fill="none" stroke="#F5A020" stroke-width="4.5" stroke-dasharray="57 22" stroke-linecap="round" stroke-dashoffset="20"/>
  <!-- r=113 navy -->
  <circle cx="250" cy="250" r="113" fill="none" stroke="#2E3192" stroke-width="4.5" stroke-dasharray="64 25" stroke-linecap="round" stroke-dashoffset="10"/>
