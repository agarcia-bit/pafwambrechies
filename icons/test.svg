  <circle cx="250" cy="250" r="125" fill="none" stroke="#E84528" stroke-width="4.5" stroke-dasharray="62 24" stroke-linecap="round" stroke-dashoffset="28"/>
  <!-- r=137 bleu ciel -->
  <circle cx="250" cy="250" r="137" fill="none" stroke="#4ABDE8" stroke-width="4.5" stroke-dasharray="62 24" stroke-linecap="round" stroke-dashoffset="16"/>
  <!-- r=149 or -->
  <circle cx="250" cy="250" r="149" fill="none" stroke="#F5A020" stroke-width="4.5" stroke-dasharray="61 24" stroke-linecap="round" stroke-dashoffset="36"/>
  <!-- r=161 navy -->
  <circle cx="250" cy="250" r="161" fill="none" stroke="#2E3192" stroke-width="4.5" stroke-dasharray="60 24" stroke-linecap="round" stroke-dashoffset="22"/>
  <!-- r=173 rouge -->
  <circle cx="250" cy="250" r="173" fill="none" stroke="#E84528" stroke-width="4.5" stroke-dasharray="65 26" stroke-linecap="round" stroke-dashoffset="44"/>
  <!-- r=185 bleu ciel -->
  <circle cx="250" cy="250" r="185" fill="none" stroke="#4ABDE8" stroke-width="4.5" stroke-dasharray="64 25" stroke-linecap="round" stroke-dashoffset="32"/>
  <!-- r=197 or -->
  <circle cx="250" cy="250" r="197" fill="none" stroke="#F5A020" stroke-width="4.5" stroke-dasharray="63 25" stroke-linecap="round" stroke-dashoffset="55"/>
  <!-- r=209 navy -->
  <circle cx="250" cy="250" r="209" fill="none" stroke="#2E3192" stroke-width="4.5" stroke-dasharray="63 25" stroke-linecap="round" stroke-dashoffset="42"/>

  <!-- Texte central -->
  <text x="250" y="238" text-anchor="middle" dominant-baseline="middle"
    font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="700"
    fill="#2E3192" letter-spacing="3">PAF</text>
  <text x="250" y="278" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400"
    fill="#2E3192" letter-spacing="5">WAMBRECHIES</text>

  <!-- Tagline bas -->
  <text x="250" y="464" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400"
    fill="#9CA3AF" letter-spacing="3.5">PROMOUVOIR . ANIMER . FEDERER</text>
